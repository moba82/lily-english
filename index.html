<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lily & Lola Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --mint: #bbf7d0; --mint-dark: #4ade80; --pink: #f472b6; --pink-dark: #db2777; --bg: #fdf2f8; }
        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        .screen { display: none; width: 100%; max-width: 450px; animation: fadeIn 0.4s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 4px solid var(--mint); text-align: center; margin-bottom: 20px; }
        
        /* Mascotte Animata */
        .avatar-container { width: 120px; height: 120px; margin: 0 auto 15px; position: relative; }
        .avatar { width: 100%; height: 100%; background: var(--pink); border-radius: 50%; border: 5px solid white; box-shadow: 0 0 20px var(--pink); display: flex; align-items: center; justify-content: center; font-size: 50px; transition: 0.3s; }
        .talking { animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); box-shadow: 0 0 30px var(--pink); } 100% { transform: scale(1); } }

        h1 { color: var(--pink-dark); margin: 10px 0; font-weight: 900; }
        .btn { background: var(--mint); color: #065f46; border: none; padding: 16px; border-radius: 50px; font-weight: 800; cursor: pointer; width: 100%; margin: 8px 0; font-size: 16px; box-shadow: 0 4px 0 var(--mint-dark); transition: 0.2s; }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn-pink { background: var(--pink); color: white; box-shadow: 0 4px 0 var(--pink-dark); }

        /* Chat */
        #chat-box { height: 300px; overflow-y: auto; background: #fff; border: 2px solid var(--pink); border-radius: 20px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-weight: 600; }
        .msg.bot { align-self: flex-start; background: var(--pink); color: white; }
        .msg.user { align-self: flex-end; background: var(--mint); color: #065f46; }

        /* Quiz */
        .quiz-input { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--mint); font-size: 18px; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="screen-start" class="screen active">
        <div class="card">
            <div class="avatar-container"><div class="avatar">🌸</div></div>
            <h1>Ciao Zoe!</h1>
            <p>Con chi vuoi parlare oggi?</p>
            <button class="btn" onclick="initApp('en')">🇬🇧 Lily (English)</button>
            <button class="btn btn-pink" onclick="initApp('es')">🇪🇸 Lola (Español)</button>
        </div>
    </div>

    <div id="screen-home" class="screen">
        <div class="card">
            <div class="avatar-container"><div id="main-avatar" class="avatar">🌸</div></div>
            <h2 id="welcome-text" style="color:var(--pink-dark)">Ready?</h2>
            <button class="btn" onclick="startChat()">💬 Parliamo un po'</button>
            <button class="btn btn-pink" onclick="showScreen('screen-topics')">📚 Esercizi e Quiz</button>
            <button class="btn" onclick="showScreen('screen-start')" style="background:#eee; box-shadow:none;">Cambia Lingua</button>
        </div>
    </div>

    <div id="screen-chat" class="screen">
        <div class="card">
            <div id="chat-box"></div>
            <p id="chat-status" style="font-size:12px; color:gray;">Premi il microfono per parlare</p>
            <button class="btn btn-pink" onclick="toggleListening()" id="mic-btn">🎤 Parla ora</button>
            <button onclick="showScreen('screen-home')" style="border:none; background:none; cursor:pointer; color:gray; margin-top:10px;">Indietro</button>
        </div>
    </div>

    <div id="screen-topics" class="screen">
        <div class="card">
            <h2 style="color:var(--pink-dark)">Cosa ripassiamo?</h2>
            <button class="btn" onclick="startHouseworkQuiz()">🎯 Housework (ITA -> ENG)</button>
            <button class="btn btn-pink" onclick="startGrammar()">📝 Grammatica Medie</button>
            <button class="btn" onclick="showScreen('screen-home')">Torna alla Home</button>
        </div>
    </div>

    <div id="screen-quiz" class="screen">
        <div class="card">
            <h2 id="quiz-title">Quiz</h2>
            <div id="quiz-area">
                <p id="question">Parola...</p>
                <input type="text" id="answer-input" class="quiz-input" placeholder="Scrivi qui...">
                <button class="btn" onclick="checkAnswer()">Invia Risposta</button>
            </div>
            <div id="quiz-result" style="display:none">
                <h2 id="final-score"></h2>
                <button class="btn" onclick="showScreen('screen-topics')">Continua</button>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        let recognition;
        let isListening = false;
        let houseworkList = [
            {ita: "Spolverare", eng: "dust"},
            {ita: "Rifare il letto", eng: "make the bed"},
            {ita: "Lavare i piatti", eng: "wash the dishes"},
            {ita: "Passare l'aspirapolvere", eng: "vacuum"}
        ];
        let currentQ = 0;
        let score = 0;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function initApp(lang) {
            currentLang = lang;
            const avatar = document.getElementById('main-avatar');
            const welcome = document.getElementById('welcome-text');
            if(lang === 'en') {
                avatar.innerText = "🌸"; welcome.innerText = "Hi Zoe, I'm Lily!";
            } else {
                avatar.innerText = "💃"; welcome.innerText = "¡Hola Zoe, soy Lola!";
            }
            showScreen('screen-home');
        }

        // --- LOGICA CHAT VOCALE ---
        function startChat() {
            showScreen('screen-chat');
            const intro = currentLang === 'en' ? "Hi Zoe! Let's talk about housework or your day. How are you?" : "¡Hola Zoe! ¿Cómo estás hoy?";
            speak(intro);
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = currentLang === 'en' ? 'en-US' : 'es-ES';
            const avatar = document.querySelector('.avatar');
            msg.onstart = () => avatar.classList.add('talking');
            msg.onend = () => avatar.classList.remove('talking');
            window.speechSynthesis.speak(msg);
            addMessage(text, 'bot');
        }

        function toggleListening() {
            if (!('webkitSpeechRecognition' in window)) return alert("Il tuo browser non supporta il riconoscimento vocale.");
            
            recognition = new webkitSpeechRecognition();
            recognition.lang = currentLang === 'en' ? 'en-US' : 'es-ES';
            
            recognition.onstart = () => { 
                document.getElementById('mic-btn').innerText = "🔴 Ti ascolto..."; 
                document.getElementById('mic-btn').style.background = "#ff4d4d";
            };
            
            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                addMessage(speechToText, 'user');
                handleBotResponse(speechToText);
            };

            recognition.onend = () => {
                document.getElementById('mic-btn').innerText = "🎤 Parla ora";
                document.getElementById('mic-btn').style.background = "var(--pink)";
            };

            recognition.start();
        }

        function handleBotResponse(text) {
            // Simulazione logica di correzione
            let response = "";
            if(currentLang === 'en') {
                response = "Great! But remember: did you mean to say 'I like' instead of 'I likes'?";
            } else {
                response = "¡Muy bien! Pero recuerda: ¿querías decir 'me gusta' invez de 'mi gusta'?";
            }
            setTimeout(() => speak(response), 1000);
        }

        function addMessage(text, sender) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // --- LOGICA QUIZ HOUSEWORK ---
        function startHouseworkQuiz() {
            currentQ = 0; score = 0;
            showScreen('screen-quiz');
            document.getElementById('quiz-result').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            nextQuestion();
        }

        function nextQuestion() {
            if(currentQ < houseworkList.length) {
                document.getElementById('question').innerText = `Traduci: "${houseworkList[currentQ].ita}"`;
                document.getElementById('answer-input').value = "";
            } else {
                finishQuiz();
            }
        }

        function checkAnswer() {
            const ans = document.getElementById('answer-input').value.toLowerCase().trim();
            if(ans === houseworkList[currentQ].eng) {
                score++;
                alert("Corretto! 🎉");
            } else {
                alert(`Ops! Si scrive: ${houseworkList[currentQ].eng}`);
            }
            currentQ++;
            nextQuestion();
        }

        function finishQuiz() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('quiz-result').style.display = 'block';
            document.getElementById('final-score').innerText = `Punteggio Finale: ${score} / ${houseworkList.length}`;
        }

        function startGrammar() {
            alert("Ripasso: Past Simple (I walked), Have to (Obligation), Irregular Verbs. Studia le schede!");
        }
    </script>
</body>
</html>
