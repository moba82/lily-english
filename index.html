<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lily & Lola - English & Spanish</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
:root {
  --mint: #bbf7d0;
  --mint-dark: #86efac;
  --pink: #f472b6;
  --pink-dark: #db2777;
  --bg: #f0fdf4;
  --white: #ffffff;
}

* { box-sizing:border-box; margin:0; padding:0; }
body {
  min-height:100vh;
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 16px;
  color: #374151;
}

.screen { display: none; width: 100%; max-width: 500px; animation: fadeIn 0.3s ease; }
.screen.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Elementi Comuni */
.card {
  background: var(--white);
  border-radius: 24px;
  padding: 24px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  margin-bottom: 20px;
  text-align: center;
  border: 4px solid var(--mint);
}

h1 { color: var(--pink-dark); font-weight: 900; margin-bottom: 10px; }
p { color: #4b5563; margin-bottom: 20px; }

.btn {
  background: var(--mint);
  color: #065f46;
  border: none;
  padding: 15px 25px;
  border-radius: 50px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
  margin-bottom: 12px;
  font-size: 16px;
  box-shadow: 0 4px 0 var(--mint-dark);
}

.btn:active { transform: translateY(2px); box-shadow: none; }
.btn-pink { background: var(--pink); color: white; box-shadow: 0 4px 0 var(--pink-dark); }

/* Chat Styles */
#chat-container {
  height: 400px;
  overflow-y: auto;
  padding: 10px;
  display: flex; flex-direction: column; gap: 10px;
  background: #fff;
  border-radius: 15px;
  margin-bottom: 15px;
  border: 2px solid var(--pink);
}

.msg { max-width: 80%; padding: 12px; border-radius: 18px; font-weight: 600; position: relative; }
.msg.lily { align-self: flex-start; background: var(--pink); color: white; border-bottom-left-radius: 2px; }
.msg.user { align-self: flex-end; background: var(--mint); color: #065f46; border-bottom-right-radius: 2px; }

.translate-btn {
  font-size: 12px; margin-top: 5px; display: block; cursor: pointer; text-decoration: underline; opacity: 0.8;
}

.input-area { display: flex; gap: 8px; }
input[type="text"] {
  flex: 1; padding: 12px 20px; border-radius: 30px; border: 2px solid var(--mint); outline: none;
}

/* Calendario */
.calendar-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px;
}
.day-circle {
  width: 30px; height: 30px; border-radius: 50%; background: #e5e7eb;
  display: flex; align-items: center; justify-content: center; font-size: 10px;
}
.day-active { background: var(--mint-dark); color: #065f46; font-weight: bold; }

</style>
</head>
<body>

<div id="screen-lang" class="screen active">
  <div class="card">
    <div id="lottie-welcome" style="height:150px;"></div>
    <h1>Hello Zoe!</h1>
    <p>Choose your language / Elige tu idioma</p>
    <button class="btn" onclick="startApp('en')">🇬🇧 English with Lily</button>
    <button class="btn btn-pink" onclick="startApp('es')">🇪🇸 Español con Lola</button>
  </div>
</div>

<div id="screen-home" class="screen">
  <div class="card">
    <h2 id="home-title" style="color:var(--pink)">Welcome back!</h2>
    <div id="calendar-container">
      <p>Your Progress 🔥 <span id="streak-count">0</span> days</p>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>
    <hr style="margin:20px 0; border:1px solid #eee;">
    <button class="btn" onclick="showScreen('screen-chat')">💬 Start Chat</button>
    <button class="btn btn-pink" onclick="showScreen('screen-topics')">📚 Exercises</button>
    <button class="btn" onclick="showScreen('screen-lang')" style="background:#eee; color:#666; box-shadow:none;">Change Language</button>
  </div>
</div>

<div id="screen-chat" class="screen">
  <div class="card" style="padding:15px;">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
      <button onclick="showScreen('screen-home')" style="border:none; background:none; cursor:pointer;">⬅️ Back</button>
      <strong id="chat-with" style="color:var(--pink)">Chat with Lily</strong>
    </div>
    <div id="chat-container"></div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type a message...">
      <button class="btn" style="width:auto; margin:0;" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<div id="screen-topics" class="screen">
  <div class="card">
    <button onclick="showScreen('screen-home')" style="float:left; border:none; background:none;">⬅️</button>
    <h2 style="color:var(--pink); margin-bottom:20px;">Exercises</h2>
    <button class="btn" onclick="startVocabQuiz()">🎯 Vocabulary Quiz</button>
    <button id="btn-verbs" class="btn btn-pink" onclick="startVerbQuiz()">🔤 Irregular Verbs</button>
    <button class="btn" onclick="startGrammarQuiz()">📝 Grammar Test</button>
    <button class="btn btn-pink" onclick="startReadingComp()">📖 Reading Comprehension</button>
  </div>
</div>

<div id="screen-quiz" class="screen">
  <div class="card">
    <div id="quiz-content"></div>
  </div>
</div>

<script>
let currentLang = 'en';
let streak = 0;
const history = JSON.parse(localStorage.getItem('study_history') || '{}');

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'screen-home') renderCalendar();
}

function startApp(lang) {
  currentLang = lang;
  document.getElementById('home-title').innerText = lang === 'en' ? "Hi, I'm Lily! 🌸" : "¡Hola, soy Lola! 💃";
  document.getElementById('chat-with').innerText = lang === 'en' ? "Chat with Lily" : "Habla con Lola";
  
  // Nascondi verbi irregolari per spagnolo se non necessari
  document.getElementById('btn-verbs').style.display = lang === 'en' ? 'block' : 'none';
  
  showScreen('screen-home');
  markAttendance();
}

function markAttendance() {
  const today = new Date().toISOString().split('T')[0];
  history[today] = true;
  localStorage.setItem('study_history', JSON.stringify(history));
}

function renderCalendar() {
  const grid = document.getElementById('calendar-grid');
  grid.innerHTML = '';
  const today = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(today.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    const dayName = d.toLocaleDateString(currentLang, {weekday:'short'});
    const dot = document.createElement('div');
    dot.className = `day-circle ${history[dateStr] ? 'day-active' : ''}`;
    dot.innerHTML = `<div>${dayName}<br>${d.getDate()}</div>`;
    grid.appendChild(dot);
  }
}

// LOGICA CHAT SEMPLIFICATA
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if(!text) return;

  addMessage(text, 'user');
  input.value = '';

  // Simulazione risposta Lily/Lola (Qui si collega l'API Vercel /api/chat)
  setTimeout(() => {
    let response = currentLang === 'en' ? 
      "That's interesting! Did you mean: 'I want to learn'?" : 
      "¡Qué bien! ¿Querías decir: 'Quiero aprender'?";
    addMessage(response, 'lily', "Traduzione: Interessante! Intendevi dire...");
  }, 1000);
}

function addMessage(text, sender, translation = "") {
  const container = document.getElementById('chat-container');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.innerText = text;
  
  if(translation) {
    const tBtn = document.createElement('span');
    tBtn.className = 'translate-btn';
    tBtn.innerText = "🇮🇹 Traduci";
    tBtn.onclick = () => {
      const isTranslated = div.innerText.includes(translation);
      div.innerText = isTranslated ? text : text + "\n\n" + translation;
    };
    div.appendChild(tBtn);
  }
  
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// Inizializzazione Lottie
lottie.loadAnimation({
  container: document.getElementById('lottie-welcome'),
  renderer: 'svg',
  loop: true,
  autoplay: true,
  path: 'https://assets9.lottiefiles.com/packages/lf20_7wwmupbm.json'
});

// Funzioni Quiz da implementare con le tue liste...
function startVocabQuiz() { alert("Starting Vocabulary Quiz..."); }
function startVerbQuiz() { alert("Starting Irregular Verbs..."); }
function startGrammarQuiz() { alert("Starting Grammar Test..."); }
function startReadingComp() { alert("Starting Reading Section..."); }

</script>
</body>
</html>
