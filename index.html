<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Learn with Lily & Lola</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
/* --- STILI GENERALI --- */
* { box-sizing:border-box; margin:0; padding:0; }
body {
  min-height:100vh;
  background:linear-gradient(160deg,#f0fdf8 0%,#fdf0f5 55%,#f0fdf4 100%);
  font-family:'Nunito',sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:20px 16px;
}

.screen { display:none; width:100%; max-width:500px; animation: floatUp .5s ease; }
.screen.active { display:flex; flex-direction:column; align-items:center; }

@keyframes floatUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* --- SCHERMATA INIZIALE --- */
.lang-card {
  background:white; border-radius:36px; padding:40px 30px; text-align:center;
  box-shadow:0 16px 40px rgba(0,0,0,0.1); width:100%;
}
.lang-card h1 { font-family:'Baloo 2', cursive; color:#5a2d82; margin-bottom:10px; }
.lang-selection { display:flex; flex-direction:column; gap:15px; margin-top:20px; }

.btn-choice {
  border:none; border-radius:24px; padding:20px; cursor:pointer;
  display:flex; align-items:center; gap:15px; transition: 0.2s;
  text-align:left; text-decoration:none;
}
.btn-choice:hover { transform: scale(1.02); }

.btn-en { background: #dcfce7; border: 3px solid #86efac; color: #166534; }
.btn-es { background: #fef3c7; border: 3px solid #fcd34d; color: #92400e; }

.btn-choice img { width: 60px; height: 60px; border-radius: 50%; background: white; }
.btn-choice .info b { font-size: 20px; display: block; }

/* --- TOPICS & MENU --- */
.menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 20px; }
.menu-item {
  background: white; border: 2px solid #eee; border-radius: 20px; padding: 15px;
  text-align: center; cursor: pointer; transition: 0.2s; font-weight: 800;
}
.menu-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

/* Colori Inglese (Menta/Rosa) */
.theme-en .menu-item { border-color: #86efac; color: #065f46; }
.theme-en .topbar { background: #f0fdf4; border-bottom: 2px solid #86efac; }

/* Colori Spagnolo (Giallo/Arancio) */
.theme-es .menu-item { border-color: #fcd34d; color: #92400e; }
.theme-es .topbar { background: #fffbeb; border-bottom: 2px solid #fcd34d; }

.topbar {
  width: 100%; padding: 15px; display: flex; align-items: center; 
  border-radius: 20px 20px 0 0; gap: 10px;
}
.back-btn { background: #eee; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }

/* --- CHAT STYLES --- */
.chat-window {
  width: 100%; height: 500px; background: white; border-radius: 0 0 20px 20px;
  display: flex; flex-direction: column; overflow: hidden; border: 1px solid #eee;
}
.chat-msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-weight: 600; }
.msg-bot { align-self: flex-start; background: #f3f4f6; }
.msg-user { align-self: flex-end; background: #ec4899; color: white; }
.chat-input { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
.chat-input input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }

</style>
</head>
<body>

<div id="screen-home" class="screen active">
  <div class="lang-card">
    <h1>Ciao Zoe! 🌟</h1>
    <p>Con chi vuoi studiare oggi?</p>
    <div class="lang-selection">
      <button class="btn-choice btn-en" onclick="startApp('en')">
        <div style="font-size:40px">🇬🇧</div>
        <div class="info"><b>English with Lily</b><span>Verde Menta & Rosa</span></div>
      </button>
      <button class="btn-choice btn-es" onclick="startApp('es')">
        <div style="font-size:40px">🇪🇸</div>
        <div class="info"><b>Español con Lola</b><span>Giallo & Arancio</span></div>
      </button>
    </div>
  </div>
</div>

<div id="screen-topics" class="screen">
  <div class="topbar" id="topics-bar">
    <button class="back-btn" onclick="showScreen('screen-home')">← Esci</button>
    <span id="teacher-name" style="font-weight:900;"></span>
  </div>
  <div class="menu-grid" id="topics-grid">
    </div>
</div>

<div id="screen-activity" class="screen">
  <div class="topbar" id="activity-bar">
    <button class="back-btn" onclick="showScreen('screen-topics')">← Indietro</button>
    <span id="activity-title" style="font-weight:800;"></span>
  </div>
  <div class="chat-window">
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Scrivi qui...">
      <button class="back-btn" style="background:#ec4899; color:white;" onclick="handleInput()">Invia</button>
    </div>
  </div>
</div>

<script>
let currentLang = 'en';

const content = {
  en: {
    teacher: "Lily 🇬🇧",
    theme: "theme-en",
    topics: [
      { id: 'chat', label: '💬 Chat A2', icon: '✨' },
      { id: 'vocab', label: '🎯 Housework', icon: '🏠' },
      { id: 'verbs', label: '🔤 Irregular Verbs', icon: '📝' },
      { id: 'grammar', label: '📝 Grammar', icon: '⚙️' },
      { id: 'reading', label: '📖 Reading', icon: '📚' }
    ]
  },
  es: {
    teacher: "Lola 🇪🇸",
    theme: "theme-es",
    topics: [
      { id: 'chat', label: '💬 Chat A2 Spagnolo', icon: '💃' },
      { id: 'vocab', label: '🎯 Casa y Hogar', icon: '🏡' },
      { id: 'grammar', label: '📝 Gramática', icon: '✍️' },
      { id: 'reading', label: '📖 Lectura', icon: '📖' }
    ]
  }
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startApp(lang) {
  currentLang = lang;
  const config = content[lang];
  
  // Imposta tema e nome
  document.getElementById('screen-topics').className = 'screen active ' + config.theme;
  document.getElementById('teacher-name').innerText = config.teacher;
  
  // Genera Bottoni Menu
  const grid = document.getElementById('topics-grid');
  grid.innerHTML = '';
  config.topics.forEach(t => {
    const btn = document.createElement('div');
    btn.className = 'menu-item';
    btn.innerHTML = `<div>${t.icon}</div><div>${t.label}</div>`;
    btn.onclick = () => openActivity(t);
    grid.appendChild(btn);
  });
  
  showScreen('screen-topics');
}

function openActivity(topic) {
  const config = content[currentLang];
  document.getElementById('screen-activity').className = 'screen active ' + config.theme;
  document.getElementById('activity-title').innerText = topic.label;
  
  const msgs = document.getElementById('chat-msgs');
  msgs.innerHTML = '';
  
  // Messaggio di benvenuto personalizzato
  let welcome = "";
  if(currentLang === 'en') {
    welcome = `Hi Zoe! I'm Lily. Ready to practice ${topic.label}?`;
  } else {
    welcome = `¡Hola Zoe! Soy Lola. ¿Lista para practicar ${topic.label}?`;
  }
  
  addMsg(welcome, 'bot');
  showScreen('screen-activity');
}

function addMsg(text, type) {
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = `msg msg-${type}`;
  div.innerText = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function handleInput() {
  const inp = document.getElementById('user-input');
  if(!inp.value) return;
  addMsg(inp.value, 'user');
  
  // Semplice risposta simulata
  setTimeout(() => {
    const resp = currentLang === 'en' ? "Great! Keep going!" : "¡Muy bien! ¡Sigue así!";
    addMsg(resp, 'bot');
  }, 800);
  
  inp.value = '';
}
</script>

</body>
</html>
